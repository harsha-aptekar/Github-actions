
name: Build WF

on:
  push:
    branches: 
      - main

  pull_request:
    branches:
      - main


  workflow_dispatch:

  schedule:
    - cron: '50 1 * * *' # Runs every day at midnight

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
        with:
          fetch-depth: 0


      - name: Maven Build
        run: mvn install

      - name: Upload Build Artifact (WAR)
        uses: actions/upload-artifact@v4
        with:
          name: vprolfile-app
          path: target/*.war

      - name: Notifiy if build fails
        if: failure()
        run: echo "Build failed! Please check the logs for details."
        else:
          run: echo "Build succeeded! Proceeding to testing."
  

  Testing:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

        with:
          fetch-depth: 0

      - name: Maven Test
        run: mvn test