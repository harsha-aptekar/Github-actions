
name: Build WF

on:
  push:
    branches: 
      - main

  pull_request:
    branches:
      - main


  workflow_dispatch:

  schedule:
    - cron: '45 1 * * *' # Runs every day at midnight

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
        with:
          fetch-depth: 0


      - name: Maven Build
        run: mvn install
  

  Testing:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

        with:
          fetch-depth: 0

      - name: Maven Test
        run: mvn test