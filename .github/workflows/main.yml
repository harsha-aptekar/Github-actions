
name: Build WF

on:
  push:
    branches: 
      - main

  pull_request:
    branches:
      - main


  workflow_dispatch:

  schedule:
    - cron: '20 21 * * *' # Runs every day at 2:50 AM IST

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
        with:
          fetch-depth: 0


      - name: Maven Build
        run: mvn install

      - name: Upload Build Artifact (WAR)
        uses: actions/upload-artifact@v4
        with:
          name: vprolfile-app
          path: target/*.war

      - name: Notifiy if build fails
        if: failure()
        run: echo "Build failed! Please check the logs for details."
        
  

  Testing:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

        with:
          fetch-depth: 0

      - name: Maven Test
        if: github.ref == 'refs/heads/main' 
        run: mvn test

  Security-Scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

        with:
          fetch-depth: 0

      - name: Run trivy security scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
          format: json
          output: 'trivy-results.json'

      - name: Upload Trivy Scan Results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan-results
          path: trivy-results.json